<!DOCTYPE html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Enigma{% endblock %}</title>

    <!-- Anti-FOUC: apply theme before first paint -->
    <script>
    (function() {
        var VALID = ['ocean','sunset','forest','minimalist','golden','arctic','desert','tech','botanical','galaxy','red'];
        function getCookie(name) {
            var m = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            return m ? m[2] : null;
        }
        var t = getCookie('app-theme') || localStorage.getItem('app-theme');
        if (!VALID.includes(t)) t = 'ocean';
        document.documentElement.setAttribute('data-theme', t);
        var rawDark = getCookie('app-dark') || localStorage.getItem('app-dark');
        var isDark = rawDark !== null ? rawDark === 'true' : window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (isDark) document.documentElement.classList.add('dark');
    })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        darkMode: 'class',
        theme: {
            extend: {
                colors: {
                    primary: {
                        light:   'rgb(var(--color-primary-light) / <alpha-value>)',
                        DEFAULT: 'rgb(var(--color-primary) / <alpha-value>)',
                        dark:    'rgb(var(--color-primary-dark) / <alpha-value>)',
                        50:  'rgb(var(--color-primary-50) / <alpha-value>)',
                        100: 'rgb(var(--color-primary-100) / <alpha-value>)',
                        200: 'rgb(var(--color-primary-200) / <alpha-value>)',
                        300: 'rgb(var(--color-primary-300) / <alpha-value>)',
                        400: 'rgb(var(--color-primary-400) / <alpha-value>)',
                        500: 'rgb(var(--color-primary-500) / <alpha-value>)',
                        600: 'rgb(var(--color-primary-600) / <alpha-value>)',
                        700: 'rgb(var(--color-primary-700) / <alpha-value>)',
                        800: 'rgb(var(--color-primary-800) / <alpha-value>)',
                    }
                }
            }
        }
    }
    </script>

<body class="h-full bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100"

    <!-- Theme manager script -->
    <script>
    function themeManager() {
        const VALID = ['ocean','sunset','forest','minimalist','golden','arctic','desert','tech','botanical','galaxy','red'];
        const COOKIE_OPTS = '; path=/; max-age=' + (365 * 24 * 3600) + '; domain=.gagnonbourgault.com; SameSite=Lax';

        function getCookie(name) {
            const m = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            return m ? m[2] : null;
        }

        return {
            theme: 'ocean',
            dark: false,

            init() {
                const t = getCookie('app-theme') || localStorage.getItem('app-theme');
                this.theme = VALID.includes(t) ? t : 'ocean';
                const rawDark = getCookie('app-dark') || localStorage.getItem('app-dark');
                this.dark = rawDark !== null ? rawDark === 'true' : window.matchMedia('(prefers-color-scheme: dark)').matches;
                this._apply();
            },

            setTheme(t) {
                if (!VALID.includes(t)) return;
                this.theme = t;
                localStorage.setItem('app-theme', t);
                document.cookie = 'app-theme=' + t + COOKIE_OPTS;
                this._apply();
            },

            toggleDark() {
                this.dark = !this.dark;
                localStorage.setItem('app-dark', String(this.dark));
                document.cookie = 'app-dark=' + this.dark + COOKIE_OPTS;
                this._apply();
            },

            _apply() {
                const html = document.documentElement;
                html.setAttribute('data-theme', this.theme);
                html.classList.toggle('dark', this.dark);
            },
        };
    }
    </script>
</body>
