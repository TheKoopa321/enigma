<!-- Theme picker dropdown -->
<div class="relative" x-data="{ open: false }">
    <button @click="open = !open" @keydown.escape.window="open = false"
            class="flex items-center gap-1.5 text-sm text-primary-200 dark:text-gray-400
                   hover:text-white dark:hover:text-gray-200 transition"
            title="Apparence">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none"
             viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M4.098 19.902a3.75 3.75 0 0 0 5.304 0l6.401-6.402M6.75 21A3.75 3.75 0 0 1 3 17.25V4.125C3 3.504 3.504 3 4.125 3h5.25c.621 0 1.125.504 1.125 1.125v4.072M6.75 21a3.75 3.75 0 0 0 3.75-3.75V8.197M6.75 21h13.125c.621 0 1.125-.504 1.125-1.125v-5.25c0-.621-.504-1.125-1.125-1.125h-4.072M10.5 8.197l2.88-2.88c.438-.439 1.15-.439 1.59 0l3.712 3.713c.44.44.44 1.152 0 1.59l-2.879 2.88M6.75 17.25h.008v.008H6.75v-.008Z" />
        </svg>
    </button>

    <div x-show="open"
         @click.outside="open = false"
         x-transition:enter="transition ease-out duration-150"
         x-transition:enter-start="opacity-0 -translate-y-1"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-100"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 -translate-y-1"
         x-cloak
         class="absolute right-0 top-full mt-2 z-50 bg-white dark:bg-gray-800
                rounded-xl shadow-xl border border-gray-200 dark:border-gray-700
                p-4 flex flex-col gap-3 min-w-max">

        <div class="flex items-center justify-between gap-6">
            <span class="text-xs font-medium text-gray-500 dark:text-gray-400">Mode</span>
            <button @click="toggleDark()"
                    class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg
                           bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300
                           text-xs font-medium hover:bg-gray-200 dark:hover:bg-gray-600 transition">
                <svg x-show="dark" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4"
                     fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
                </svg>
                <svg x-show="!dark" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4"
                     fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
                </svg>
                <span x-text="dark ? 'Clair' : 'Sombre'"></span>
            </button>
        </div>

        <div class="border-t border-gray-100 dark:border-gray-700"></div>

        <div>
            <span class="text-xs font-medium text-gray-500 dark:text-gray-400 block mb-2">Couleur</span>
            <div class="grid grid-cols-5 gap-2">
                <template x-for="t in [
                    {id:'ocean',name:'Ocean',c:'#2d8b8b'},{id:'sunset',name:'Coucher de soleil',c:'#e76f51'},
                    {id:'forest',name:'Foret',c:'#2d4a2b'},{id:'minimalist',name:'Epure',c:'#36454f'},
                    {id:'golden',name:'Dore',c:'#f4a900'},{id:'arctic',name:'Arctique',c:'#4a6fa5'},
                    {id:'desert',name:'Desert',c:'#5d2e46'},{id:'tech',name:'Tech',c:'#0066ff'},
                    {id:'botanical',name:'Jardin',c:'#4a7c59'},{id:'galaxy',name:'Galaxie',c:'#4a4e8f'},
                    {id:'red',name:'Rouge',c:'#ff0000'}
                ]">
                    <button @click="setTheme(t.id)" :title="t.name"
                            class="w-7 h-7 rounded-full transition hover:scale-110 focus:outline-none"
                            :style="`background-color:${t.c}`"
                            :class="theme === t.id ? 'ring-2 ring-offset-2 dark:ring-offset-gray-800' : ''"
                            :style="`background-color:${t.c}; ${theme === t.id ? 'box-shadow: 0 0 0 2px var(--tw-ring-offset-color, white), 0 0 0 4px ' + t.c : ''}`">
                    </button>
                </template>
            </div>
        </div>
    </div>
</div>
